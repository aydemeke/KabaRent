# Server
server.port=8080

# DataSource ? PostgreSQL - local
#spring.datasource.url=jdbc:postgresql://localhost:5432/kabarent
#spring.datasource.username=myuser
#spring.datasource.password=mypassword
#spring.datasource.driver-class-name=org.postgresql.Driver

#Server
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# CORS (configured in CorsConfig.java)
app.cors.allowed-origins=http://localhost:5173

# Auth JWT (secret must be at least 32 bytes; override via env in production)
app.jwt.secret=${JWT_SECRET:dev-only-change-me-min-32-bytes-secret-key-0123456789}
app.jwt.expiration-ms=86400000

# Admin
app.admin.email=${ADMIN_EMAIL:kabarentadmin@gmail.com}
app.admin.password=${ADMIN_PASSWORD:12345678}

# Rate limiting ? per-instance, in-memory limiter guarding public POST writes
# (POST /api/orders and POST /api/auth/register); per-client (CF-Connecting-IP / XFF).
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.orders.per-minute=${RATE_LIMIT_ORDERS_PER_MINUTE:10}
app.rate-limit.orders.per-hour=${RATE_LIMIT_ORDERS_PER_HOUR:100}
# Registration is a rare one-time action ? deliberately stricter than orders.
app.rate-limit.register.per-hour=${RATE_LIMIT_REGISTER_PER_HOUR:3}
app.rate-limit.register.per-day=${RATE_LIMIT_REGISTER_PER_DAY:10}

# Notifications
app.notifications.provider=${NOTIFICATIONS_PROVIDER:logging}

# Resend (email provider) ? used only when app.notifications.provider=resend
app.resend.api-key=${RESEND_API_KEY:}
app.resend.from=${RESEND_FROM:onboarding@resend.dev}
