# Server
server.port=8080

# DataSource ? PostgreSQL - local
#spring.datasource.url=jdbc:postgresql://localhost:5432/kabarent
#spring.datasource.username=myuser
#spring.datasource.password=mypassword
#spring.datasource.driver-class-name=org.postgresql.Driver

#Server
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# CORS (configured in CorsConfig.java)
app.cors.allowed-origins=http://localhost:5173

# Auth JWT (secret must be at least 32 bytes; override via env in production)
app.jwt.secret=${JWT_SECRET:dev-only-change-me-min-32-bytes-secret-key-0123456789}
app.jwt.expiration-ms=86400000

# Admin
app.admin.email=${ADMIN_EMAIL:admin@kabarent.local}
app.admin.password=${ADMIN_PASSWORD:12345678}

# Rate limiting ? per-instance, in-memory limiter guarding public POST /api/orders
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
app.rate-limit.orders.per-minute=${RATE_LIMIT_ORDERS_PER_MINUTE:10}
app.rate-limit.orders.per-hour=${RATE_LIMIT_ORDERS_PER_HOUR:100}
